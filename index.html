        .view { display:none; } .view.active { display:flex; }

        @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .spinner { border:2px solid #e5e7eb; border-top-color:#2563eb; border-radius:50%; width:16px; height:16px; animation: spin 0.6s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .card { background:#fff; border:1px solid #e5e7eb; border-radius:16px; }
        .input { width:100%; padding:10px 14px; border:1.5px solid #e5e7eb; border-radius:12px; background:#fff; font-size:14px; }

        .toast.success { background:#111827; color:#fff; }
        .toast.error { background:#ef4444; color:#fff; }
        @keyframes toastIn { from{transform:translateY(-20px);opacity:0} to{transform:translateY(0);opacity:1} }
    </style>
</head>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey:"AIzaSyCBNXmBtTQrPmtZMMuc-x9NVSF16tXT-0U",
            authDomain:"erapatunsam-8c240.firebaseapp.com",
            projectId:"erapatunsam-8c240",
            storageBucket:"erapatunsam-8c240.firebasestorage.app",
            messagingSenderId:"617985924115",
            appId:"1:617985924115:web:6edc6c27b7094f81faf3e6"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Supabase Configuration
        const SUPABASE_URL = 'https://whtmgsqgcahnfuexrumf.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodG1nc3FnY2FobmZ1ZXhydW1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyOTkzNTUsImV4cCI6MjA5MDg3NTM1NX0.BPqnl6SSO6mY4Lxvfpbb8qej8sW8IiOKG4xXG10kwAs'; 
        let supabaseClient;
        try {
            if (typeof supabase !== 'undefined') {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('✅ Supabase initialized');
            }
        } catch (err) {
            console.error("❌ Supabase Init Error:", err);
        }

        let currentUser=null, currentRoomId=null, isNotulen=false;
        let unsubRoom=null, unsubAtt=null;
        let timerInterval=null;
        let roomsCache=[];

        function toast(msg, type='success') {
            const c=document.getElementById('toastContainer');
            const t=document.createElement('div');
            t.className=`toast ${type}`; t.textContent=msg; c.appendChild(t);
            setTimeout(()=>{if(t.parentNode)t.remove();},3000);
        }

        function showView(id){
            document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setLoad(btnId,spinId,on){
            const b=document.getElementById(btnId),s=document.getElementById(spinId);
            if(b)b.classList.toggle('hidden',on);
            if(s)s.classList.toggle('hidden',!on);
        }

        function fmt(cmd, value=null) { 
            document.execCommand(cmd, false, value); 
            document.getElementById('editor').focus(); 
        }

        function triggerImageUpload() { 
            document.getElementById('editorImageInput').click(); 
        }

        // FIXED IMAGE UPLOAD FUNCTION
        async function handleEditorImageInsert(event) {
            const files = Array.from(event.target.files);
            if(!files.length || !currentRoomId) return;
            
            const editor = document.getElementById('editor');
            editor.focus();
            
            if (!supabaseClient) {
                toast('Supabase tidak terinisialisasi', 'error');
                return;
            }
            
            for(const file of files){
                if(!file.type.startsWith('image/')) continue;
                try{
                    console.log('📤 Uploading file:', file.name);
                    const path = `attachments/${currentRoomId}/images/${Date.now()}_${file.name}`;
                    
                    // Upload to Supabase
                    const { data: uploadData, error: uploadError } = await supabaseClient.storage
                        .from('meeting-docs')
                        .upload(path, file);
                    
                    if(uploadError) {
                        console.error('❌ Upload error:', uploadError);
                        throw new Error(`Upload gagal: ${uploadError.message}`);
                    }
                    
                    console.log('✅ File uploaded:', uploadData);
                    
                    // Get public URL - FIXED DESTRUCTURING
                    const { data: urlData, error: urlError } = supabaseClient.storage
                        .from('meeting-docs')
                        .getPublicUrl(path);
                    
                    if(urlError) {
                        console.error('❌ Get URL error:', urlError);
                        throw new Error(`Gagal mendapatkan URL: ${urlError.message}`);
                    }
                    
                    if(!urlData || !urlData.publicUrl) {
                        console.error('❌ Invalid URL data:', urlData);
                        throw new Error('URL tidak valid');
                    }
                    
                    const fileUrl = urlData.publicUrl;
                    console.log('✅ Public URL:', fileUrl);
                    
                    // Save to Firestore - WITH ERROR HANDLING
                    try {
                        await db.collection('attachments').add({
                            roomId: currentRoomId, 
                            type: 'image',
                            fileUrl: fileUrl, 
                            fileName: file.name,
                            uploadedBy: currentUser.uid, 
                            uploadedByName: window.userData?.name || 'User',
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        console.log('✅ Saved to Firestore');
                    } catch (firestoreError) {
                        console.error('❌ Firestore error:', firestoreError);
                        throw new Error(`Gagal simpan ke database: ${firestoreError.message}`);
                    }
                    
                    // Insert image to editor
                    const imgHtml = `<img src="${fileUrl}?t=${Date.now()}" alt="${file.name}" style="max-width:100%;height:auto;border-radius:4px;margin:8px 0;"><br>`;
                    document.execCommand('insertHTML', false, imgHtml);
                    
                    // Auto-save
                    await db.collection('rooms').doc(currentRoomId).update({
                        notes: editor.innerHTML
                    });
                    
                    toast('Gambar berhasil disisipkan','success');
                }catch(e){ 
                    console.error('❌ Image upload error:', e); 
                    toast('Gagal upload: ' + e.message, 'error'); 
                }
            }
            event.target.value='';
        }

        async function handleLogin(){
            const e=document.getElementById('loginEmail').value.trim();
            const p=document.getElementById('loginPassword').value;
            if(!e||!p) return toast('Email & password harus diisi','error');
            
            setLoad('loginBtnText','loginSpinner',true);
            try{
                await auth.signInWithEmailAndPassword(e,p);
                toast('Berhasil masuk!','success');
            } catch(err){
                toast(err.message.replace('Firebase: ',''),'error');
            }
            setLoad('loginBtnText','loginSpinner',false);
        }

        async function handleGoogleLogin(){
            try{
                await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
                toast('Berhasil masuk!','success');
            } catch(err){
                if(!err.message.includes('popup')) toast(err.message,'error');
            }
        }

        async function handleLogout(){
            if(unsubRoom) unsubRoom();
            if(unsubAtt) unsubAtt();
            await auth.signOut();
            toast('Berhasil keluar','info');
        }

        auth.onAuthStateChanged(async(user)=>{
            if(user){
                currentUser=user;
                const doc=await db.collection('users').doc(user.uid).get();
                if(doc.exists){
                    window.userData=doc.data();
                } else {
                    window.userData = {
                        name:user.displayName||user.email.split('@')[0],
                        email:user.email
                    };
                    await db.collection('users').doc(user.uid).set(window.userData);
                }
                showView('dashboardView');
                loadDashboard();
            } else {
                currentUser=null;
                showView('authView');
            }
        });

        function loadDashboard(){
            loadRooms();
            loadStats();
        }

        async function loadStats(){
            try{
                const snap=await db.collection('rooms').get();
                let ac=0, tc=0;
                const today=new Date();
                today.setHours(0,0,0,0);
                
                snap.forEach(r=>{
                    const d=r.data();
                    if(d.status==='aktif') ac++;
                    if(d.createdAt?.toDate()>=today) tc++;
                });
                
                document.getElementById('statActive').textContent=ac;
                document.getElementById('statToday').textContent=tc;
            } catch(e){
                console.error('Error loading stats:', e);
            }
        }

        function loadRooms(){
            if(unsubRoom) unsubRoom();
            unsubRoom=db.collection('rooms').orderBy('createdAt','desc').onSnapshot(snap=>{
                roomsCache=[];
                snap.forEach(r=>{
                    const d=r.data();
                    d.id=r.id;
                    roomsCache.push(d);
                });
                renderRooms();
            }, err=>{
                console.error('Firestore error:', err);
                toast('Error memuat data: ' + err.message, 'error');
            });
        }

        function renderRooms(){
            const tm={
                rapat_dosen:'Rapat Dosen',
                bimbingan_skripsi:'Bimbingan',
                rapat_prodi:'Rapat Prodi',
                rapat_fakultas:'Rapat Fakultas',
                lainnya:'Lainnya'
            };
            
            const act = roomsCache.filter(r=>r.status==='aktif');
            const al=document.getElementById('activeRoomsList');
            
            if(!al) return;
            
            if(act.length === 0){
                al.innerHTML = '<div class="text-center text-gray-400 py-8">Tidak ada rapat aktif</div>';
                return;
            }
            
            al.innerHTML = act.map(r => {
                const io=r.notulen_id===currentUser?.uid;
                return `
                    <div class="card card-hover p-4 cursor-pointer" onclick="${io?`enterRoom('${r.id}')`:''}">
                        <h3 class="font-bold text-gray-900 mb-2">${r.title||'Rapat'}</h3>
                        <span class="inline-block px-2 py-1 bg-brand/10 text-brand text-xs rounded-md">${tm[r.jenis_rapat]||'Umum'}</span>
                        <div class="mt-3 flex items-center justify-between text-xs text-gray-500">
                            <span>${r.notulen_name||'?'}</span>
                            <span>👥 ${(r.participants?.length||0)+1}</span>
                        </div>
                        <div class="mt-3">
                            <div class="w-full py-2 ${io?'bg-brand text-white':'bg-gray-200 text-gray-600'} rounded-lg text-xs text-center font-medium">
                                ${io?'Masuk (Notulen)':'Lihat Detail'}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function enterRoom(rid){
            currentRoomId=rid;
            const editor = document.getElementById('editor');
            if(!editor) return;
            
            const doc=await db.collection('rooms').doc(rid).get();
            if(!doc.exists) return toast('Rapat tidak ditemukan','error');
            
            const r=doc.data();
            r.id=doc.id;
            
            if(r.status!=='aktif') return toast('Rapat sudah berakhir','warning');
            
            isNotulen=r.notulen_id===currentUser.uid;
            const tm={
                rapat_dosen:'Rapat Dosen',
                bimbingan_skripsi:'Bimbingan',
                rapat_prodi:'Rapat Prodi',
                rapat_fakultas:'Rapat Fakultas',
                lainnya:'Lainnya'
            };
            
            document.getElementById('rTitle').textContent=r.title;
            document.getElementById('rNotulen').textContent=r.notulen_name;
            document.getElementById('rType').textContent=tm[r.jenis_rapat]||'Umum';
            
            const rTimer = document.getElementById('rTimer');
            if(rTimer) rTimer.textContent='00:00:00';
            
            window._meetStart=r.createdAt.toDate().getTime();
            if(timerInterval) clearInterval(timerInterval);
            timerInterval=setInterval(updateTimer,1000);
            updateTimer();
            
            if(isNotulen){
                document.getElementById('rPinBox')?.classList.remove('hidden');
                const rPin = document.getElementById('rPin');
                if(rPin) rPin.textContent=r.pin;
                document.getElementById('rEndBtn')?.classList.remove('hidden');
                document.getElementById('notulenMode')?.classList.remove('hidden');
                document.getElementById('viewerMode')?.classList.add('hidden');
                editor.innerHTML=r.notes||'';
            } else {
                document.getElementById('rPinBox')?.classList.add('hidden');
                document.getElementById('rEndBtn')?.classList.add('hidden');
                document.getElementById('notulenMode')?.classList.add('hidden');
                document.getElementById('viewerMode')?.classList.remove('hidden');
                const viewerNotes = document.getElementById('viewerNotes');
                if(viewerNotes) viewerNotes.innerHTML=r.notes||'<p class="text-gray-400 italic">Belum ada notulensi...</p>';
            }
            
            showView('roomView');
            setupListeners(rid);
        }

        function setupListeners(rid){
            if(unsubRoom) unsubRoom();
            unsubRoom=db.collection('rooms').doc(rid).onSnapshot(doc=>{
                if(!doc.exists){
                    toast('Rapat dihapus','warning');
                    leaveRoom();
                    return;
                }
                const r=doc.data();
                if(r.status!=='aktif'){
                    toast('Rapat diakhiri','warning');
                    leaveRoom();
                    return;
                }
                if(!isNotulen){
                    const viewerNotes = document.getElementById('viewerNotes');
                    if(viewerNotes) viewerNotes.innerHTML=r.notes||'<p class="text-gray-400 italic">Belum ada notulensi...</p>';
                }
            }, err=>{
                console.error('Firestore listener error:', err);
            });
            
            if(unsubAtt) unsubAtt();
            unsubAtt=db.collection('attendance').where('roomId','==',rid).onSnapshot(snap=>{
                let participants=[];
                snap.forEach(d=>participants.push({id:d.id,...d.data()}));
                
                const rPCount = document.getElementById('rPCount');
                const rPList = document.getElementById('rPList');
                
                if(rPCount) rPCount.textContent=participants.length;
                if(!rPList) return;
                
                rPList.innerHTML='';
                if(!participants.length){
                    rPList.innerHTML='<p class="text-xs text-gray-400 text-center py-4">Belum ada peserta</p>';
                    return;
                }
                
                participants.forEach(a=>{
                    const name=a.name||'Pesenta';
                    rPList.innerHTML+=`
                        <div class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50">
                            <div class="w-8 h-8 bg-brand/10 text-brand rounded-full flex items-center justify-center text-xs font-bold">
                                ${name.charAt(0).toUpperCase()}
                            </div>
                            <div class="flex-1">
                                <p class="text-xs font-bold">${name}</p>
                            </div>
                        </div>
                    `;
                });
            }, err=>{
                console.error('Attendance listener error:', err);
            });
        }

        function updateTimer(){
            if(!window._meetStart) return;
            const d=Math.floor((Date.now()-window._meetStart)/1000);
            const el=document.getElementById('rTimer');
            if(el){
                el.textContent=[Math.floor(d/3600),Math.floor((d%3600)/60),d%60]
                    .map(x=>String(x).padStart(2,'0')).join(':');
            }
        }

        function openCreateModal(){
            document.getElementById('createModal').classList.remove('hidden');
            document.getElementById('createModal').classList.add('flex');
            document.getElementById('cTitle').value='';
            document.getElementById('cAgenda').value='';
            document.getElementById('cLoc').value='';
            setTimeout(()=>document.getElementById('cTitle').focus(),100);
        }

        function hideCreateModal(){
            document.getElementById('createModal').classList.add('hidden');
            document.getElementById('createModal').classList.remove('flex');
        }

        async function submitCreate(){
            const title=document.getElementById('cTitle').value.trim();
            const agenda=document.getElementById('cAgenda').value.trim();
            const type=document.getElementById('cType').value;
            const loc=document.getElementById('cLoc').value.trim();
            
            if(!title) return toast('Judul rapat harus diisi','error');
            
            setLoad('cBtnText','cSpinner',true);
            try{
                const pin=String(Math.floor(100000+Math.random()*900000));
                const ref=await db.collection('rooms').add({
                    title,
                    agenda,
                    jenis_rapat:type,
                    lokasi:loc,
                    notulen_id:currentUser.uid,
                    notulen_name:window.userData.name,
                    pin,
                    status:'aktif',
                    notes:'',
                    participants:[],
                    createdAt:firebase.firestore.FieldValue.serverTimestamp()
                });
                
                await db.collection('attendance').doc(ref.id).set({
                    roomId:ref.id,
                    userId:currentUser.uid,
                    name:window.userData.name,
                    role:'notulen',
                    joinedAt:firebase.firestore.FieldValue.serverTimestamp()
                });
                
                toast('Rapat dibuat! PIN: '+pin,'success');
                hideCreateModal();
                enterRoom(ref.id);
            } catch(e){
                console.error('Create room error:', e);
                toast(e.message,'error');
            }
            setLoad('cBtnText','cSpinner',false);
        }

        function showEndModal(){
            document.getElementById('endModal').classList.remove('hidden');
            document.getElementById('endModal').classList.add('flex');
        }

        function hideEndModal(){
            document.getElementById('endModal').classList.add('hidden');
            document.getElementById('endModal').classList.remove('flex');
        }

        async function confirmEnd(){
            hideEndModal();
            try{
                if(isNotulen){
                    const editor = document.getElementById('editor');
                    await db.collection('rooms').doc(currentRoomId).update({
                        notes:editor?.innerHTML||'',
                        status:'selesai'
                    });
                }
                toast('Rapat diakhiri','info');
                leaveRoom();
            } catch(e){
                toast(e.message,'error');
            }
        }

        function leaveRoom(){
            currentRoomId=null;
            isNotulen=false;
            if(timerInterval) clearInterval(timerInterval);
            if(unsubRoom) unsubRoom();
            if(unsubAtt) unsubAtt();
            showView('dashboardView');
            loadDashboard();
        }

        document.addEventListener('DOMContentLoaded',()=>{
            document.getElementById('loginPassword')?.addEventListener('keydown',e=>{
                if(e.key==='Enter') handleLogin();
            });
        });
    </script>
</body>
</html>
