        .color-popover { display:none; position:absolute; top:44px; background:#fff; border:1px solid #e5e7eb; border-radius:14px; padding:10px; box-shadow:0 10px 25px -5px rgba(0,0,0,0.15); z-index:20; width:150px; }
        .color-popover.active { display:block; animation:scaleIn 0.15s; }
        .color-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
        .color-dot { width:36px; height:36px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform 0.15s; position:relative; }

        function toast(msg, type='success') {
            const c=document.getElementById('toastContainer');
            const t=document.createElement('div');
            t.className=`toast ${type}`; t.textContent=msg; c.appendChild(t);
            setTimeout(()=>{if(t.parentNode)t.remove();},3000);

        function genPin(){return String(Math.floor(100000+Math.random()*900000));}
        function fmtD(ts){return ts?new Date(ts.toDate()).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}):'-';}
        function fmtT(ts){return ts?new Date(ts.toDate()).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}):'-';}
        function fmtFull(ts){return ts?new Date(ts.toDate()).toLocaleString('id-ID',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'-';}
        function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');}
        function setLoad(btnId,spinId,on){const b=document.getElementById(btnId),s=document.getElementById(spinId);if(b)b.classList.toggle('hidden',on);if(s)s.classList.toggle('hidden',!on);}
        function toggleAuthMode(){document.getElementById('loginForm').classList.toggle('hidden');document.getElementById('registerForm').classList.toggle('hidden');}
        function initials(name){if(!name)return'?';return name.split(' ').filter(w=>w.length>0).map(w=>w[0]).join('').substring(0,2).toUpperCase();}
        function updateTimer(){
            if(!window._meetStart)return;
            const d=Math.floor((Date.now()-window._meetStart)/1000);
            document.getElementById('rTimer').textContent=[Math.floor(d/3600),Math.floor((d%3600)/60),d%60].map(x=>String(x).padStart(2,'0')).join(':');
            document.getElementById('rDuration').textContent=`${Math.floor(d/3600)}j ${Math.floor((d%3600)/60)}m`;
        }

        function fmt(cmd, value=null) { document.execCommand(cmd, false, value); document.getElementById('editor').focus(); }
        function togglePalette(id) {
            document.querySelectorAll('.color-popover').forEach(p => { if(p.id !== id) p.classList.remove('active'); });
            const el = document.getElementById(id); if(el) el.classList.toggle('active');
        }
        function applyTextColor(hex) { document.execCommand('foreColor', false, hex); togglePalette('textPalette'); document.getElementById('editor').focus(); }
        function applyHighlight(hex) {
            if(hex==='transparent') document.execCommand('removeFormat', false, null);
            else document.execCommand('hiliteColor', false, hex);
            togglePalette('highlightPalette'); document.getElementById('editor').focus();
        }
        document.addEventListener('click', e => {
            document.querySelectorAll('.color-popover').forEach(p => {
                if (!p.contains(e.target) && !p.previousElementSibling?.contains(e.target)) p.classList.remove('active');
            });
        });
        function toggleFocusMode() {
            isFocusMode = !isFocusMode;
            document.body.classList.toggle('focus-mode', isFocusMode);
            document.getElementById('focusModeBtn').classList.toggle('active', isFocusMode);
            toast(isFocusMode?'Mode Fokus Aktif':'Mode Fokus Nonaktif','info');
        }
        function updateCounts(){
            const editor=document.getElementById('editor');
            const text=editor.innerText||'';
            document.getElementById('charCount').textContent=text.length+' karakter';
            document.getElementById('wordCount').textContent=(text.trim()?text.trim().split(/\s+/).length:0)+' kata';
        }
        function markUnsaved(){hasUnsaved=true;document.getElementById('saveInd').innerHTML='<span class="w-1.5 h-1.5 bg-amber-500 rounded-full"></span> Belum tersimpan';}
        function debouncedSave(){
            const currentContent = document.getElementById('editor').innerHTML;
            if(currentContent === lastSavedContent) return;
            if(saveTimer)clearTimeout(saveTimer);
            saveTimer=setTimeout(async()=>{
                try{
                    await db.collection('rooms').doc(currentRoomId).update({notes:currentContent});
                    lastSavedContent=currentContent; hasUnsaved=false;
                    document.getElementById('saveInd').innerHTML='<span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span> Tersimpan';
                }catch(e){document.getElementById('saveInd').innerHTML='<span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span> Gagal';}
            },800);
        }
        
        function insertHtmlAtCursor(html) {
            const editor = document.getElementById('editor');
            editor.focus();
            const sel = window.getSelection();
            if (sel.rangeCount) {
                const range = sel.getRangeAt(0);
                range.deleteContents();
                const frag = document.createRange().createContextualFragment(html);
                range.insertNode(frag);
                range.setStartAfter(frag.lastChild || frag);
                range.collapse(true);
                sel.removeAllRanges();
                sel.addRange(range);
            } else {
                editor.innerHTML += html;
            }
            debouncedSave();
        }

        function triggerImageUpload() { document.getElementById('editorImageInput').click(); }
        async function handleEditorImageUpload(event) {
            const files = Array.from(event.target.files);
            if(!files.length || !currentRoomId) return;
            toast('Mengupload gambar...','info');
            const uploadedUrls = [];
            for(const file of files){
                if(!file.type.startsWith('image/')) continue;
                try{
                    const path = `images/${currentRoomId}/${Date.now()}_${file.name}`;
                    const { error: uploadError } = await supabaseClient.storage.from('meeting-docs').upload(path, file);
                    if(uploadError) throw uploadError;
                    const {  urlData } = supabaseClient.storage.from('meeting-docs').getPublicUrl(path);
                    if(urlData && urlData.publicUrl) uploadedUrls.push(urlData.publicUrl);
                }catch(e){console.error(e);}
            }
            if(uploadedUrls.length){
                // Gambar akan muncul normal tanpa transform mode
                uploadedUrls.forEach(url => insertHtmlAtCursor(`<img src="${url}?t=${Date.now()}"><br>`));
                toast(`${uploadedUrls.length} gambar ditambahkan`,'success');
            }
            event.target.value='';
        }
        function embedLink() {
            const url = prompt("Masukkan URL link:");
            if(url && (url.startsWith('http') || url.startsWith('www'))){
                const finalUrl = url.startsWith('www') ? `https://${url}` : url;
                insertHtmlAtCursor(`<a href="${finalUrl}" target="_blank">${finalUrl}</a>&nbsp;`);
            }
        }
